apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}
  labels:
    app: {{ .Values.app.name }}
    team: doda2025-team20   # Required for Prometheus ServiceMonitor selector
spec:
  ports:
    - name: http
      port: {{ .Values.app.port }}
      targetPort: {{ .Values.app.port }}

    # Metrics port — using same container port
    - name: metrics
      port: {{ .Values.app.metricsPort }}
      targetPort: {{ .Values.app.metricsPort }}

  selector:
    app: {{ .Values.app.name }}